version: "3.8"

services:
  postgres:
    image: postgres:latest
    container_name: quiz-db
    restart: always
    environment:
      POSTGRES_USER: quizuser
      POSTGRES_PASSWORD: 123@Mudar
      POSTGRES_DB: quizdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
